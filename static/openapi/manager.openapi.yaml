  /api/v2/calls/reporting:
    get:
      description: "Returns a paginated, filterable list of the customer's calls for reporting in the list envelope `{ items: Call[], pagination, success }`. Every filter is optional and combines with AND; each filter can also be supplied under a `filters.` prefix (e.g. `filters.state`) — the two forms are equivalent. Free-text `q` matches numbers, agent/queue name, conversation and session ids. Add `format=csv` to stream the result as a CSV download instead of JSON."
      operationId: listReportingCalls
      parameters:
        - description: 1-based page number to return (default 1).
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: Maximum number of calls to return per page.
          explode: true
          in: query
          name: max
          required: false
          schema:
            type: integer
          style: form
        - description: Filter by call-session uuid.
          explode: true
          in: query
          name: sessionId
          required: false
          schema:
            $ref: '#/components/schemas/ObjectUuid'
          style: form
        - description: Filter by conversation uuid.
          explode: true
          in: query
          name: conversationId
          required: false
          schema:
            $ref: '#/components/schemas/ObjectUuid'
          style: form
        - description: Filter by one or more call uuids.
          explode: true
          in: query
          name: id
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Filter by parent-call uuid; returns the child legs of the given call(s).
          explode: true
          in: query
          name: parentId
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Filter by call type.
          in: query
          name: type
          schema:
            $ref: '#/components/schemas/listReportingCalls_type_parameter'
        - description: Filter by the caller (origin) number.
          explode: true
          in: query
          name: from
          required: false
          schema:
            $ref: '#/components/schemas/ReportingNumberFilter'
          style: form
        - description: Alias of `from` — filter by the caller (origin) number.
          explode: true
          in: query
          name: fromNumber
          required: false
          schema:
            $ref: '#/components/schemas/ReportingNumberFilter'
          style: form
        - description: Filter by the called (destination) number.
          explode: true
          in: query
          name: to
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_to_parameter'
          style: form
        - description: Alias of `to` — filter by the called (destination) number.
          explode: true
          in: query
          name: toNumber
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_to_parameter'
          style: form
        - description: Only include calls at or after this time (Unix timestamp, seconds).
          explode: true
          in: query
          name: time.start
          required: false
          schema:
            $ref: '#/components/schemas/UnixTimestamp'
          style: form
        - description: Only include calls at or before this time (Unix timestamp, seconds).
          explode: true
          in: query
          name: time.end
          required: false
          schema:
            $ref: '#/components/schemas/UnixTimestamp'
          style: form
        - description: Filter by the uuid of the agent who handled the call.
          explode: true
          in: query
          name: agentId
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Free-text search across caller/called number, agent and queue name, and conversation/session id.
          explode: true
          in: query
          name: q
          required: false
          schema:
            description: Free Text Query
            type: string
          style: form
        - description: Filter by call state.
          explode: true
          in: query
          name: state
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_state_parameter'
          style: form
        - description: Filter by call domain (internal, external or other).
          in: query
          name: domain
          schema:
            $ref: '#/components/schemas/listReportingCalls_domain_parameter'
        - description: Filter by call source.
          explode: true
          in: query
          name: source
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_source_parameter'
          style: form
        - description: Filter by the reason the call ended.
          explode: true
          in: query
          name: finishReason
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_finishReason_parameter'
          style: form
        - description: When true, return only calls with a withheld caller id.
          explode: true
          in: query
          name: anonymous
          required: false
          schema:
            type: boolean
          style: form
        - description: Same as `sessionId`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.sessionId
          required: false
          schema:
            $ref: '#/components/schemas/ObjectUuid'
          style: form
        - description: Same as `conversationId`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.conversationId
          required: false
          schema:
            $ref: '#/components/schemas/ObjectUuid'
          style: form
        - description: Same as `id`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.id
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Same as `parentId`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.parentId
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Filter by call type (under the `filters.` prefix).
          explode: true
          in: query
          name: filters.type
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_type_parameter'
          style: form
        - description: Same as `from`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.from
          required: false
          schema:
            $ref: '#/components/schemas/ReportingNumberFilter'
          style: form
        - description: Same as `fromNumber`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.fromNumber
          required: false
          schema:
            $ref: '#/components/schemas/ReportingNumberFilter'
          style: form
        - description: Same as `to`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.to
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_to_parameter'
          style: form
        - description: Same as `toNumber`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.toNumber
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_to_parameter'
          style: form
        - description: Same as `time.start`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.time.start
          required: false
          schema:
            $ref: '#/components/schemas/UnixTimestamp'
          style: form
        - description: Same as `time.end`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.time.end
          required: false
          schema:
            $ref: '#/components/schemas/UnixTimestamp'
          style: form
        - description: Same as `agentId`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.agentId
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_id_parameter'
          style: form
        - description: Same as `q`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.q
          required: false
          schema:
            description: Free Text Query
            type: string
          style: form
        - description: Same as `state`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.state
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_state_parameter'
          style: form
        - description: Filter by call domain (under the `filters.` prefix).
          explode: true
          in: query
          name: filters.domain
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_domain_parameter'
          style: form
        - description: Same as `source`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.source
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_source_parameter'
          style: form
        - description: Same as `finishReason`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.finishReason
          required: false
          schema:
            $ref: '#/components/schemas/listReportingCalls_finishReason_parameter'
          style: form
        - description: Same as `anonymous`, under the `filters.` prefix.
          explode: true
          in: query
          name: filters.anonymous
          required: false
          schema:
            type: boolean
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCallResponse'
          description: A paginated list of calls
      summary: List calls (reporting)
