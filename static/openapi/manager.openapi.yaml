      description: "Sets custom variables on the call's session so later call-flow steps can read them. Send a `variables` map; **only keys prefixed with `app.` are accepted** — all other keys are ignored. Existing `app.*` variables with the same key are overwritten. Returns `{ success, item: { id } }`."
