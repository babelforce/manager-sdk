openapi: 3.0.3
info:
  version: 0.0.0-dev
  license:
    name: MIT
    url: https://www.mit.edu/~amini/LICENSE.md
  title: Manager API
  termsOfService: https://www.babelforce.com/impressum
  contact:
    email: support@babelforce.com
paths:
  /api/v2/actions:
    get:
      description: List the available trigger/automation actions (catalog)
      operationId: listActions
      parameters:
        - description: Filter actions by provider/type
          explode: true
          in: query
          name: type
          required: false
          schema:
            type: string
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectListResponse'
          description: List of available actions
      summary: ''
      tags:
        - Manager
        - Action
  /api/v2/actions/{actionType}/{actionName}:
    post:
      description: Execute a call/queue action directly
      operationId: executeAction
      parameters:
        - description: The action type (e.g. call, queue)
          explode: false
          in: path
          name: actionType
          required: true
          schema:
            type: string
          style: simple
        - description: The action name
          explode: false
          in: path
          name: actionName
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
        description: Action parameters / context
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Action
  /api/v2/actions/{providerName}/{providerActionName}/params:
    get:
      description: List an action's input parameters
      operationId: listActionParams
      parameters:
        - description: Path Parameter providerName
          explode: false
          in: path
          name: providerName
          required: true
          schema:
            type: string
          style: simple
        - description: Path Parameter providerActionName
          explode: false
          in: path
          name: providerActionName
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectListResponse'
          description: List of action parameters
      summary: ''
      tags:
        - Manager
        - Action
  /api/v2/actions/{provider}/{actionName}/variables:
    get:
      description: Lists the session variables a single provider action exposes — the keys you can read from or write to the call session when the action runs.
      operationId: listSingleActionSessionVariables
      parameters:
        - description: The integration provider (e.g. `zendesk`, `custom`).
          explode: false
          in: path
          name: provider
          required: true
          schema:
            $ref: '#/components/schemas/IntegrationProvider'
          style: simple
        - description: The action whose session variables to list.
          explode: false
          in: path
          name: actionName
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariableDefinitionItemsResponse'
          description: Response
      summary: List an action's session variables
      tags:
        - Integration
  /api/v2/agents:
    get:
      description: Get a List of all Agents
      operationId: listAgents
      parameters:
        - description: Parameter [page]
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: Parameter [max]
          explode: true
          in: query
          name: max
          required: false
          schema:
            type: integer
          style: form
        - description: |
            When specified searches multiples fields at once:
            - name
            - group.name
            - number
            - email
            - sourceId
            - integration.label
          explode: true
          in: query
          name: q
          required: false
          schema:
            type: string
          style: form
        - description: Allows to filter for enabled or disabled Agents
          explode: true
          in: query
          name: enabled
          required: false
          schema:
            type: boolean
          style: form
        - description: Search for Agent Name
          explode: true
          in: query
          name: name
          required: false
          schema:
            type: string
          style: form
        - description: Filter for the Agents Number
          explode: true
          in: query
          name: number
          required: false
          schema:
            type: string
          style: form
        - description: Filter for Agents having a specified Integration Source-ID
          explode: true
          in: query
          name: sourceId
          required: false
          schema:
            type: string
          style: form
        - description: Filter for Agents State
          explode: true
          in: query
          name: state
          required: false
          schema:
            $ref: '#/components/schemas/AgentLineStatus'
          style: form
        - description: Filter for Agents Source Integration
          explode: true
          in: query
          name: source
          required: false
          schema:
            type: string
          style: form
        - description: Filter Agents belonging to a certain Group by Group-ID
          explode: true
          in: query
          name: groupIds
          required: false
          schema:
            $ref: '#/components/schemas/listAgents_groupIds_parameter'
          style: form
        - description: Filter Agents belonging to a certain Group by Group-Name
          explode: true
          in: query
          name: groups
          required: false
          schema:
            $ref: '#/components/schemas/listAgents_groupIds_parameter'
          style: form
        - description: Filter agents by tags
          explode: true
          in: query
          name: tags
          required: false
          schema:
            $ref: '#/components/schemas/listAgents_groupIds_parameter'
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentResponse'
          description: Paginated List of all Agents
      summary: Get a List of all Agents
      tags:
        - Manager
        - Agent
      x-babelforce-resource: Agent
      x-babelforce-rest-operation: list
    post:
      description: Create Agent
      operationId: createAgent
      parameters: []
      requestBody:
        $ref: '#/components/requestBodies/RestCreateAgentBody'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentItemResponse'
          description: Newly created Agent
      summary: Create Agent
      tags:
        - Manager
        - Agent
      x-babelforce-resource: Agent
      x-babelforce-rest-operation: create
  /api/v2/agents/bulk/{bulkAction}:
    post:
      description: Apply a bulk action to multiple agents by ID
      operationId: bulkAgentAction
      parameters:
        - description: The bulk action to apply (`enable` or `disable`)
          explode: false
          in: path
          name: bulkAction
          required: true
          schema:
            enum:
              - enable
              - disable
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentBulkRequest'
        description: Agent IDs
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentBulkResponse'
          description: Per-item bulk result
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/groups:
    get:
      description: Get a List of all AgentGroups
      operationId: listAgentGroups
      parameters:
        - description: Parameter [page]
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: Parameter [max]
          explode: true
          in: query
          name: max
          required: false
          schema:
            type: integer
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentGroupResponse'
          description: Paginated List of all AgentGroups
      summary: Get a List of all AgentGroups
      tags:
        - Manager
        - AgentGroup
      x-babelforce-resource: AgentGroup
      x-babelforce-rest-operation: list
    post:
      description: Create AgentGroup
      operationId: createAgentGroup
      parameters: []
      requestBody:
        $ref: '#/components/requestBodies/RestCreateAgentGroupBody'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentGroupItemResponse'
          description: Newly created AgentGroup
      summary: Create AgentGroup
      tags:
        - Manager
        - AgentGroup
      x-babelforce-resource: AgentGroup
      x-babelforce-rest-operation: create
  /api/v2/agents/groups/bulk:
    delete:
      description: Bulk-delete agent groups by ID
      operationId: bulkDeleteAgentGroups
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkIdsRequest'
        description: Group IDs to delete
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - AgentGroup
  /api/v2/agents/groups/{groupId}/agents:
    get:
      description: List the agents in an agent group
      operationId: listAgentsInGroup
      parameters:
        - description: Path Parameter groupId
          explode: false
          in: path
          name: groupId
          required: true
          schema:
            type: string
          style: simple
        - description: Parameter [page]
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: Parameter [max]
          explode: true
          in: query
          name: max
          required: false
          schema:
            type: integer
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentResponse'
          description: Paginated list of agents in the group
      summary: ''
      tags:
        - Manager
        - AgentGroup
    post:
      description: Add an agent to an agent group by their ID
      operationId: addAgentToGroup
      parameters:
        - description: Path Parameter groupId
          explode: false
          in: path
          name: groupId
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAgentToGroupRequest'
        description: Request-Body for Add an agent to an agent group by their ID
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentGroupAdditionResponse'
          description: HTTP 200 Response
      summary: ''
      tags:
        - Manager
  /api/v2/agents/groups/{groupId}/agents/{agentId}:
    delete:
      description: Remove an agent from an agent group
      operationId: removeAgentFromGroup
      parameters:
        - description: Path Parameter groupId
          explode: false
          in: path
          name: groupId
          required: true
          schema:
            type: string
          style: simple
        - description: Path Parameter agentId
          explode: false
          in: path
          name: agentId
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentGroupItemResponse'
          description: The updated group
      summary: ''
      tags:
        - Manager
        - AgentGroup
  /api/v2/agents/groups/{id}:
    delete:
      description: Delete AgentGroup
      operationId: deleteAgentGroup
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAgentGroupResponse'
          description: Successful Deletion of AgentGroup
      summary: Delete AgentGroup
      tags:
        - Manager
        - AgentGroup
      x-babelforce-resource: AgentGroup
      x-babelforce-rest-operation: delete
    get:
      description: Get AgentGroup
      operationId: getAgentGroup
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentGroupItemResponse'
          description: A single AgentGroup
      summary: Get AgentGroup
      tags:
        - Manager
        - AgentGroup
      x-babelforce-resource: AgentGroup
      x-babelforce-rest-operation: get
    put:
      description: Update AgentGroup
      operationId: updateAgentGroup
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        $ref: '#/components/requestBodies/RestUpdateAgentGroupBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentGroupItemResponse'
          description: Updated AgentGroup
      summary: Update AgentGroup
      tags:
        - Manager
        - AgentGroup
      x-babelforce-resource: AgentGroup
      x-babelforce-rest-operation: update
  /api/v2/agents/logs:
    get:
      description: List activity logs across all agents
      operationId: listAllAgentLogs
      parameters:
        - description: Parameter [page]
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: Parameter [max]
          explode: true
          in: query
          name: max
          required: false
          schema:
            type: integer
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentLogListResponse'
          description: Paginated agent logs
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/presence/available:
    get:
      description: List the account's agent presence states
      operationId: listAgentPresences
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPresenceListResponse'
          description: List of presence states
      summary: ''
      tags:
        - Manager
        - Agent
    post:
      description: Create a custom busy presence (available=true is not supported)
      operationId: createAgentPresence
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPresenceWriteBody'
        description: Presence to create
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPresenceItemResponse'
          description: Created presence
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/presence/available/{presenceName}:
    delete:
      description: Delete a custom presence
      operationId: deleteAgentPresence
      parameters:
        - description: The presence name
          explode: false
          in: path
          name: presenceName
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Agent
    get:
      description: Get a presence by name
      operationId: getAgentPresence
      parameters:
        - description: The presence name
          explode: false
          in: path
          name: presenceName
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPresenceItemResponse'
          description: A single presence
      summary: ''
      tags:
        - Manager
        - Agent
    put:
      description: Update a busy presence's label (available=true is not supported)
      operationId: updateAgentPresence
      parameters:
        - description: The presence name
          explode: false
          in: path
          name: presenceName
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPresenceWriteBody'
        description: Presence fields to update
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPresenceItemResponse'
          description: Updated presence
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/provision:
    get:
      description: Export all agents as a semicolon-delimited CSV
      operationId: exportAgents
      parameters:
        - description: Export format (only `csv` is supported)
          explode: true
          in: query
          name: format
          required: true
          schema:
            enum:
              - csv
            type: string
          style: form
      responses:
        '200':
          content:
            text/csv:
              schema:
                type: string
          description: CSV export
      summary: ''
      tags:
        - Manager
        - Agent
    post:
      description: Import agents from a semicolon-delimited CSV (multipart upload)
      operationId: importAgents
      parameters:
        - description: Import format (only `csv` is supported)
          explode: true
          in: query
          name: format
          required: true
          schema:
            enum:
              - csv
            type: string
          style: form
        - description: Run the import as an async job (returns 202 with a job)
          explode: true
          in: query
          name: async
          required: false
          schema:
            type: boolean
          style: form
        - explode: true
          in: query
          name: createOnly
          required: false
          schema:
            type: boolean
          style: form
        - explode: true
          in: query
          name: updateOnly
          required: false
          schema:
            type: boolean
          style: form
        - explode: true
          in: query
          name: deleteUnlisted
          required: false
          schema:
            type: boolean
          style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentImportRequest'
        description: Multipart CSV upload
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportValidationResults'
          description: Synchronous import result
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportJobItemResponse'
          description: Async import job accepted
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/provision/jobs/{id}:
    get:
      description: Get the status of an async agent-import job
      operationId: getAgentImportJob
      parameters:
        - description: The import job ID
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportJobItemResponse'
          description: The import job
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/provision/validate:
    post:
      description: Validate an agent CSV import without applying it
      operationId: validateAgentImport
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentImportRequest'
        description: Multipart CSV upload
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportValidationResults'
          description: Validation result
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/push:
    post:
      description: Push a message / key-values to one or all agents (CTI)
      operationId: pushToAgent
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPushRequest'
        description: Push payload
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/status/available:
    get:
      description: List the available agent status / presence options
      operationId: listAvailableAgentStatuses
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAvailabilityListResponse'
          description: List of available statuses
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/{id}:
    delete:
      description: Delete Agent
      operationId: deleteAgent
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAgentResponse'
          description: Successful Deletion of Agent
      summary: Delete Agent
      tags:
        - Manager
        - Agent
      x-babelforce-resource: Agent
      x-babelforce-rest-operation: delete
    get:
      description: Get Agent
      operationId: getAgent
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentItemResponse'
          description: A single Agent
      summary: Get Agent
      tags:
        - Manager
        - Agent
      x-babelforce-resource: Agent
      x-babelforce-rest-operation: get
    put:
      description: Update Agent
      operationId: updateAgent
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        $ref: '#/components/requestBodies/RestUpdateAgentBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentItemResponse'
          description: Updated Agent
      summary: Update Agent
      tags:
        - Manager
        - Agent
      x-babelforce-resource: Agent
      x-babelforce-rest-operation: update
  /api/v2/agents/{id}/calls:
    post:
      description: Create an outbound call for the agent
      operationId: createAgentOutboundCall
      parameters:
        - description: Path Parameter id (the agent ID)
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentOutboundCallRequest'
        description: Outbound call request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallItemResponse'
          description: The scheduled call
      summary: ''
      tags:
        - Manager
        - Agent
        - Call
  /api/v2/agents/{id}/disable:
    put:
      description: Disable the agent's user account
      operationId: disableAgent
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/{id}/enable:
    put:
      description: Enable the agent's user account
      operationId: enableAgent
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/{id}/hangup:
    post:
      description: Hang up the call the agent is currently on
      operationId: hangupAgentCall
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultV2MessageResponse'
          description: Response
      summary: ''
      tags:
        - Manager
        - Agent
  /api/v2/agents/{id}/logs:
    get:
      description: List an agent's activity logs
      operationId: listAgentLogs
      parameters:
        - description: Path Parameter id
          explode: false
          in: path
          name: id
          required: true
          schema:
            type: string
          style: simple
        - description: Parameter [page]
          explode: true
