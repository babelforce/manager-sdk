openapi: 3.0.3
info:
  description: task-automation engine to automate and customize web based integration processes
  version: 3.63.10
  title: task-automation API
  termsOfService: https://www.babelforce.com/impressum/
  contact:
    email: support@babelforce.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: A bearer token in format Authorization:'Bearer {token}'. You need to supply {token} string.
    oauth2:
      type: oauth2
      description: OAuth2 Authentication with password flow. You need to supply your babelforce username and password, for the selected server. Select request body and your requested scope.
      flows:
        password:
          tokenUrl: /oauth/token
          refreshUrl: /oauth/token
          scopes:
            '*': All Access
  parameters:
    pathLockState:
      name: lockState
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/AgentLocking'
    pathTaskState:
      name: taskState
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/TaskState'
    queryCustomerId:
      name: customer_id
      in: query
      schema:
        format: uuid
        description: a babelforce accountId
        type: string
    pathTaskId:
      name: taskId
      in: path
      required: true
      description: id of the task
      schema:
        $ref: '#/components/schemas/UUID'
    pathAgentId:
      name: agentId
      in: path
      required: true
      description: id of the agent
      schema:
        type: string
    agentActionOnTask:
      name: agentAction
      in: path
      required: true
      description: agent action on a task
      schema:
        $ref: '#/components/schemas/AgentActions'
    interruptTo:
      name: interruptTo
      in: path
      required: true
      description: state to force a task in via interruption
      schema:
        $ref: '#/components/schemas/InterruptionTargetStates'
    queryPage:
      name: page
      in: query
      required: false
      description: page index, "1" based.
      schema:
        minimum: 1
        format: int64
        type: integer
    queryPageSize:
      name: page_size
      in: query
      required: false
      description: page size, "1..100" based.
      schema:
        minimum: 1
        format: int64
        type: integer
        maximum: 100
    queryFilter:
      name: filter
      in: query
      schema:
        type: string
      required: false
      examples:
        in state example:
          summary: In filter
          value: (state=in=( 'Scheduled', 'Assigned'))
        a complex example:
          summary: A complex example
          value: (id=in=('id1','id3','id5','id6') and state=out=('Failed')) or (state=in=('Pending'))
        equals type example:
          summary: Equals type
          value: type==babelforce.call.inbound
        not equals type example:
          summary: Not equals customer_id type
          value: customer_id!=123213-123123-123-12-3
        greater than type example:
          summary: Greater than customer_id type
          value: created_at=gt=1610115403866
        less than type example:
          summary: Less than customer_id type
          value: scheduled_at=lt=1610115403866
    scriptFilter:
      name: filter
      in: query
      schema:
        type: string
      required: false
      description: currently unsupported
    scriptResponseType:
      name: response
      in: query
      required: false
      description: explicit response type, to either select script payload or metadata
      schema:
        $ref: '#/components/schemas/ScriptResponseType'
    codeId:
      name: codeId
      in: path
      required: true
      description: id of the stored code
      schema:
        type: string
    codeType:
      name: type
      in: path
      required: true
      description: type of the stored code
      schema:
        $ref: '#/components/schemas/ScriptType'
    queryLogPresentation:
      name: type
      in: query
      schema:
        $ref: '#/components/schemas/LogType'
      required: false
    queryLogDetails:
      name: details
      in: query
      schema:
        $ref: '#/components/schemas/LogDetails'
      required: false
    queryContext:
      name: context
      in: query
      schema:
        type: boolean
        default: true
      required: false
    queryLogsFilter:
      description: |2-
         Available filter fields:
         -id: task id (uuid)
         -state: task state (Scheduled, Assigned, etc.)
         -type: task type
         -has_error: if any action has an error, basically acts as only actions with errors on action level
         -queue_id: task queue id (uuid)
         -actions.id: action.uuid
         -actions.type: action type (js, http, action, etc.)
         -actions.has_error: boolean flag if true - the action executed with an error, false - the action executed successfully
         -actions.parent: action parent id
         -meta.start: start of execution millis since epoche
         -meta.end: end of execution millis since epoche
      name: filter
      in: query
      schema:
        type: string
      required: false
      examples:
        equal filter by id:
          summary: only the task with the id matching the uuid dd062062-cbca-40d8-b3f9-15bda40eb35a
          value: (id=='dd062062-cbca-40d8-b3f9-15bda40eb35a')
        all actions that have errors for task id:
          summary: only the task with the id matching the uuid dd062062-cbca-40d8-b3f9-15bda40eb35a and only actions with errors
          value: (id=='dd062062-cbca-40d8-b3f9-15bda40eb35a' and has_error=='true')
        in filter by state:
          summary: only tasks and action with state scheduled or assigned
          value: (state=in=('Scheduled', 'Assigned'))
        not equal filter by type:
          summary: all tasks and actions that are not of type email
          value: (type!='email'))
        not in  filter by queue_id:
          summary: all tasks andactions that are not for the queueId dd062062-cbca-40d8-b3f9-15bda40eb35a, 427eeb54-199e-4123-8658-f20e3119f1d5
          value: (queue_id=out=( 'dd062062-cbca-40d8-b3f9-15bda40eb35a', '427eeb54-199e-4123-8658-f20e3119f1d5'))
        not in filter by state:
          summary: In filter
          value: (state=out=( 'Scheduled', 'Assigned'))
        in filter by action type:
          summary: In filter action type js and http
          value: (actions.type=in=( 'js', 'http'))
        not equal and filter by action parent:
          summary: not equal filter by actions.parent
          value: (actions.parent!='dd062062-cbca-40d8-b3f9-15bda40eb35a' and actions.parent!='427eeb54-199e-4123-8658-f20e3119f1d5')
        greater than meta.start:
          value: meta.start=gt=1610115403866
        less than meta.end:
          value: meta.end=lt=1610115403866
        'greater equal meta.start and less equal meta.end ':
          value: (created_at=gt=1610115400000 and created_at=lt=1610115410000)
    secretPrefix:
      in: path
      name: prefix
      required: true
      schema:
        type: string
    queryStart:
      name: start
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DateTime'
    queryEnd:
      name: end
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DateTime'
    queryTaskType:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TaskType'
    queryRate:
      name: rate
      in: query
      required: false
      description: Allows to downgrade the automatic sampling rate, e.g. start=2017-06-01T00:00:00 ->  start=2017-06-01T00:03:00 would select with a minute rate. You can downgrade to a hourly or daily rate.
      schema:
        $ref: '#/components/schemas/Rate'
  schemas:
    Id:
      type: string
      description: a unique identifier
    UUID:
      type: string
      description: a unique identifier
      format: UUID
    TimestampInMsUTC:
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
      description: Timestamp in milliseconds UTC
    Milliseconds:
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
      description: Milliseconds
    TaskType:
      type: string
      pattern: ^[a-zA-Z0-9._-]+$
      example: babelforce.call.inbound
    TaskCompletionSettings:
      type: object
      additionalProperties: false
      properties:
        autoComplete:
          type: boolean
          example: false
          description: True = tasks are not waiting for agent interactions when pending. False = task may wait forever in pending state until an agent or the system completes the task.
    AcceptTimeout:
      description: Time in milliseconds the agent has to accept a task before it is auto rejected.
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
    CompleteTimeout:
      description: Time in milliseconds the agent has to complete a task before it is auto canceled.
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
    RescheduleDelay:
      description: Time in milliseconds the task is delayed after rescheduling.
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
    ExpireIn:
      description: A time in milliseconds after task scheduling, if it is reached the task will be canceled
      type: integer
      format: int64
      minimum: 0
      maximum: 9.223372036854776e+18
    SelectionEngine:
      type: string
      enum:
        - legacy
        - acd
    TaskSelectionSettings:
      type: object
      additionalProperties: false
      properties:
        enable:
          type: boolean
          description: True = agent selection is enabled False = No agent selection will be attempted
          example: true
        auto_accept:
          type: boolean
          description: True = the selected agent has to accept the task before it will be assigned to him. False = the agent will get the task forceably assigned
          example: false
        priority:
          description: 0 = lowest priority ... 256 = higher priority ... max integer = highest priority
          type: integer
          format: int32
          example: 0
        expire_in:
          $ref: '#/components/schemas/ExpireIn'
        accept_timeout:
          $ref: '#/components/schemas/AcceptTimeout'
        complete_timeout:
          $ref: '#/components/schemas/CompleteTimeout'
        reschedule_delay:
          $ref: '#/components/schemas/RescheduleDelay'
        selection_engine:
          $ref: '#/components/schemas/SelectionEngine'
        legacy_settings:
          $ref: '#/components/schemas/TaskSelectionLegacySettings'
        acd_settings:
          $ref: '#/components/schemas/TaskSelectionAcdSettings'
    TaskSelectionLegacySettings:
      type: object
      properties:
        line_status:
          type: string
          example:
            - all
            - available
          default: available
        reachable_by_phone:
          type: boolean
          example: true
          default: true
        max:
          type: integer
          default: 1
          example: 1
          minimum: 0
          maximum: 100
        call_id:
          type: string
        exclusive:
          type: boolean
          default: true
    TaskSelectionAcdSettings:
      type: object
      properties:
        line_status:
          type: string
          example:
            - all
            - available
        reachable_by_phone:
          type: boolean
          example: true
        priority:
          type: number
          example:
            - 1
            - 0
            - 0.5
          minimum: 0
          maximum: 1
        timeout:
          type: integer
          example:
            - 1
            - 1000
            - 50000
          minimum: 0
    ActionSetting:
      type: object
      required:
        - transitions
      properties:
        transitions:
          $ref: '#/components/schemas/TaskStateEvents'
        async:
          type: boolean
          description: 'When set to true, action events on_* will run asynchronously with further state transitions.action will not block '
        timeout:
          $ref: '#/components/schemas/Milliseconds'
    AgentActions:
      type: string
      enum:
        - Accept
        - Reject
        - Complete
    AgentLocking:
      type: string
      enum:
        - unlock
    AgentLockState:
      properties:
        agent_id:
          $ref: '#/components/schemas/Id'
        state:
          type: string
          enum:
            - locked
            - unlocked
    TaskStateEvents:
      type: string
      enum:
        - on_scheduled
        - on_rescheduled
        - on_selecting
        - on_accepted
        - on_rejected
        - on_assigned
        - on_processing
        - on_pending
        - on_completed
        - on_canceled
        - on_failed
    TaskState:
      type: string
      enum:
        - Scheduled
        - Rescheduled
        - Selecting
        - Accepted
        - Rejected
        - Assigned
        - Processing
        - Pending
        - Completed
        - Canceled
        - Failed
    Actions:
      type: object
      additionalProperties: false
      properties:
        on_scheduled:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_rescheduled:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_selecting:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_accepted:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_rejected:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_assigned:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_processing:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_pending:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_completed:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_canceled:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        on_failed:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        settings:
          type: array
          items:
            $ref: '#/components/schemas/ActionSetting'
    ActionType:
      enum:
        - generic
        - noop
        - log
        - trace
        - action
        - jwt
        - http
        - js
        - js_ref
        - codeblock
        - codeblock_ref
        - async
        - pipeline
        - iteration
    TypedAction:
      anyOf:
        - $ref: '#/components/schemas/IntegrationProxyAction'
        - $ref: '#/components/schemas/HttpAction'
        - $ref: '#/components/schemas/JavaScriptAction'
        - $ref: '#/components/schemas/JavaScriptReferenceAction'
        - $ref: '#/components/schemas/CodeblockAction'
        - $ref: '#/components/schemas/CodeblockReferenceAction'
        - $ref: '#/components/schemas/JWTCreateAction'
        - $ref: '#/components/schemas/IterationAction'
        - $ref: '#/components/schemas/PipelineAction'
        - $ref: '#/components/schemas/AsyncAction'
        - $ref: '#/components/schemas/NoopAction'
        - $ref: '#/components/schemas/LogAction'
        - $ref: '#/components/schemas/GenericAction'
      discriminator:
        propertyName: action_type
        mapping:
          action: '#/components/schemas/IntegrationProxyAction'
          http: '#/components/schemas/HttpAction'
          js: '#/components/schemas/JavaScriptAction'
          js_ref: '#/components/schemas/JavaScriptReferenceAction'
          codeblock: '#/components/schemas/CodeblockAction'
          codeblock_ref: '#/components/schemas/CodeblockReferenceAction'
          async: '#/components/schemas/AsyncAction'
          pipeline: '#/components/schemas/PipelineAction'
          iteration: '#/components/schemas/IterationAction'
          noop: '#/components/schemas/NoopAction'
          log: '#/components/schemas/LogAction'
          generic: '#/components/schemas/GenericAction'
      example:
        action:
          params:
            agent_id: '{{task.assigned_agent.external_id}}'
            comment: Task has been assigned to agent {{task.assigned_agent.name}}
          type: zendesk.ticket.update
          integration_id: 1234-1234-1234-1234
    CommonActionProperties:
      type: object
      properties:
        condition:
          nullable: false
          type: string
          format: js
          description: a javascript if not set or if it returns true then the action is executed
          example: () => {return (task.body.branch_a===true && (task.body.branch_b===false || task.body.branch_c===true));}
        var:
          nullable: false
          type: string
          example: my_variable_name
        timeout:
          nullable: false
          type: integer
          format: int64
          minimum: 0
          maximum: 9.223372036854776e+18
        arguments:
          nullable: false
          type: array
          items:
            type: object
          example:
            - "1"
            - 1
            - - 1
              - 2
              - 3
            - hello: null
              world: null
        error:
          $ref: '#/components/schemas/ErrorHandlingConfig'
    ErrorHandlingConfig:
      type: object
      properties:
        visibility:
          $ref: '#/components/schemas/ErrorContextPropagationBehavior'
        handling:
          $ref: '#/components/schemas/ErrorHandlingBehavior'
    ErrorHandlingBehavior:
      type: string
      description: changes behavior if an error continues. stop - does not execute further actions in the same pipeline, continue - executes the next action regardless of a failure, enables that an error can be handled explicitly.
      enum:
        - stop
        - continue
      default: stop
    ErrorContextPropagationBehavior:
      type: string
      description: controls if an error response should be added to the context, an error is only added if there is a var for that action. show - an error response is added to the context in {varName}.["error.response"], hide - does not add the error response to the context.
      enum:
        - show
        - hide
      default: show
    ListProperties:
      type: array
      items:
        $ref: '#/components/schemas/TypedAction'
    AsyncAction:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          default: async
        async:
          $ref: '#/components/schemas/ListProperties'
    PipelineAction:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          default: pipeline
        pipeline:
          $ref: '#/components/schemas/ListProperties'
    IterationProperties:
      type: object
      required:
        - items
        - result
      properties:
        items_max:
          type: integer
          default: 100
          description: ' The number of items specified for iteration. If you supply more elements, a runtime error will occur. Additionally, when increasing this limit beyond the default, consider setting the timeout property on both the state, parents and iteration. '
        result:
          type: string
          enum:
            - single
            - full
          default: single
        onError:
          type: string
          description: on child error continue or fail the iteration
          enum:
            - fail
            - continue
          default: continue
        items:
          type: array
          items:
            type: object
        actions:
          type: array
          items:
            $ref: '#/components/schemas/TypedAction'
    IterationAction:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          default: iteration
        iteration:
          allOf:
            - $ref: '#/components/schemas/CommonActionProperties'
            - $ref: '#/components/schemas/IterationProperties'
    HttpActionProperties:
      type: object
      required:
        - method
        - url
      properties:
        body:
          type: object
          additionalProperties: true
          description: payload of the http call
          example:
            hello: world
        method:
          type: string
          description: http method
          example: POST
        checkCertificate:
          type: boolean
          default: true
        queryParams:
          type: object
          description: flat key value object
        header:
          type: object
          additionalProperties: true
          example:
            Content-Type: application/json
        url:
          type: string
          example: http://my.test.url/some/path
        mTLS:
          type: object
          description: any parameters of mTLS should be referenced as {{secrets.whatever.key}}, {{secrets.whatever.cert}},  {{secrets.whatever.ca_cert}} etc.
          required:
            - key
            - cert
            - ca_cert
          properties:
            key:
              type: string
              format: base64
              description: client private key
            cert:
              type: string
              format: base64
              description: client certificate accepted by the target server
            ca_cert:
              type: string
              format: base64
              description: public CA certificate used to create the server certificate
    Http:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/HttpActionProperties'
    HttpAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: http
            http:
              $ref: '#/components/schemas/Http'
    JavaScriptProperties:
      type: object
      required:
        - code
      properties:
        code:
          nullable: false
          type: string
    JavaScript:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/JavaScriptProperties'
    JavaScriptAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: js
            js:
              $ref: '#/components/schemas/JavaScript'
    ReferenceProperties:
      type: object
      minProperties: 1
      properties:
        identifier:
          type: string
          format: UUID
          description: system unique id to address the reference.
        name:
          type: string
          description: account unique name of the reference to address it
    JavaScriptReferenceProperties:
      type: object
      required:
        - ref
      description: A reference to a stored java script. Either the identifier or the name need to be specified.
      properties:
        ref:
          $ref: '#/components/schemas/ReferenceProperties'
    JavaScriptReference:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/JavaScriptReferenceProperties'
    JavaScriptReferenceAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: js_ref
            js_ref:
              $ref: '#/components/schemas/JavaScriptReference'
    IntegrationProxyProperties:
      type: object
      required:
        - integration_id
        - type
      properties:
        integration_id:
          type: string
          example: 52b418036e724778a3ed41d61a977fd4
        type:
          type: string
          example: ticket.create
        params:
          type: object
          additionalProperties: true
          example:
            public: false
            subject: task {{task.id}} --> {{task.body.subject}}
            custom_fields: {}
            comment: '{{task.body.description}}'
            additional_fields: {}
            type: task
            priority: high
        context:
          type: object
          additionalProperties: true
          example: {}
        queryParams:
          type: object
          additionalProperties: true
          description: flat object of query parameters
          example:
            agent_id: "1233"
    IntegrationProxy:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/IntegrationProxyProperties'
    IntegrationProxyAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: action
            action:
              $ref: '#/components/schemas/IntegrationProxy'
    LogProperties:
      type: object
      properties:
        message:
          type: string
    LogActionData:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/LogProperties'
    LogAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: log
            log:
              $ref: '#/components/schemas/LogActionData'
    NoopProperties:
      type: object
    Noop:
      allOf:
        - $ref: '#/components/schemas/CommonActionProperties'
        - $ref: '#/components/schemas/NoopProperties'
    NoopAction:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            action_type:
              type: string
              default: noop
            noop:
              $ref: '#/components/schemas/Noop'
    CodeblockProperties:
      type: object
      required:
        - actions
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/Action'
    CodeblockAction:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          default: codeblock
        codeblock:
          allOf:
            - $ref: '#/components/schemas/CommonActionProperties'
            - $ref: '#/components/schemas/CommonCodeblockProperties'
            - $ref: '#/components/schemas/CodeblockProperties'
    CodeblockReferenceProperties:
      type: object
      required:
        - ref
      description: A reference to a stored codeblock. Either the identifier or the name need to be specified.
      properties:
        ref:
          $ref: '#/components/schemas/ReferenceProperties'
    CommonCodeblockProperties:
      type: object
      properties:
        parameter:
          type: object
          additionalProperties: true
    CodeblockReferenceAction:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          default: codeblock
        codeblock:
          allOf:
            - $ref: '#/components/schemas/CommonActionProperties'
            - $ref: '#/components/schemas/CommonCodeblockProperties'
            - $ref: '#/components/schemas/CodeblockReferenceProperties'
    JWTCreateProperties:
      type: object
      required:
        - payload
        - header
      properties:
        payload:
          description: Payload that contains claims that are statements about an entity (typically, the user) and additional data see https://jwt.io/introduction
          type: object
          additionalProperties: true
          example:
            iss: trautomations@taskrouterautomations.iam.gserviceaccount.com
            aud: https://oauth2.googleapis.com/token
            scope: https://www.googleapis.com/auth/spreadsheets
        header:
          description: The header typically consists of two parts. Type of the token, which is JWT, and the signing algorithm being used, such as HMAC SHA256 or RSA see https://jwt.io/introduction
          type: object
          additionalProperties: true
          example:
            alg: RS256
            typ: JWT
        signKey:
          description: Key ued to sign the JWT, must match the type specified in the header 'alg'.
          type: string
          format: base64
        expireIn:
          $ref: '#/components/schemas/Milliseconds'
