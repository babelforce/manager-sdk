paths:
  /api/v3/tasks/configurations/selection:
    post:
      operationId: createSelectionConfiguration
      security:
        - bearerAuth: []
        - oauth2:
            - '*'
      tags:
        - accountConfiguration
      requestBody:
        $ref: '#/components/requestBodies/selectionConfigurationRequest'
      responses:
        "201":
          $ref: '#/components/responses/selectionConfigurationResponse'
    get:
      operationId: readSelectionConfiguration
      security:
        - bearerAuth: []
        - oauth2:
            - '*'
      tags:
        - accountConfiguration
      responses:
        "200":
          $ref: '#/components/responses/selectionConfigurationResponse'
    put:
      operationId: updateSelectionConfiguration
      security:
        - bearerAuth: []
        - oauth2:
            - '*'
      tags:
        - accountConfiguration
      requestBody:
        $ref: '#/components/requestBodies/selectionConfigurationRequest'
      responses:
        "200":
          $ref: '#/components/responses/selectionConfigurationResponse'
    delete:
      operationId: deleteSelectionConfiguration
      security:
        - bearerAuth: []
        - oauth2:
            - '*'
      tags:
        - accountConfiguration
      responses:
        "204":
          description: no content
  /api/v3/tasks/configurations/secrets:
    get:
      description: Retrieves a list of secret prefixes
      operationId: listSecretPrefixes
      security:
        - bearerAuth: []
        - oauth2:
            - '*'
      tags:
        - secrets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretPrefixes'
